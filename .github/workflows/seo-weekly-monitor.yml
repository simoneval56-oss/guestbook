name: SEO Weekly Monitor

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

concurrency:
  group: seo-weekly-monitor
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SEO_BASE_URL: ${{ vars.SEO_BASE_URL }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
      SEO_BRAND_TERMS: ${{ vars.SEO_BRAND_TERMS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate required secrets
        run: |
          test -n "$GSC_SITE_URL" || (echo "Missing secret: GSC_SITE_URL" && exit 1)
          test -n "$GSC_SERVICE_ACCOUNT_JSON" || (echo "Missing secret: GSC_SERVICE_ACCOUNT_JSON" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Run SEO weekly monitor
        run: npm run seo:weekly-monitor

      - name: Create or update PR with tracker changes
        uses: peter-evans/create-pull-request@v6
        with:
          # Use a dedicated PAT or GitHub App token when available so downstream
          # pull_request workflows can start on the bot-created PR.
          token: ${{ secrets.WORKFLOW_TRIGGER_TOKEN || github.token }}
          commit-message: "chore(seo): update weekly tracker"
          title: "chore(seo): update weekly tracker"
          body: |
            Aggiornamento automatico settimanale del tracker SEO.
            - source: GitHub Actions `seo-weekly-monitor.yml`
            - file: `ops/seo/seo-weekly-tracker.csv`
          branch: "chore/seo-weekly-tracker"
          delete-branch: false
          add-paths: |
            ops/seo/seo-weekly-tracker.csv
