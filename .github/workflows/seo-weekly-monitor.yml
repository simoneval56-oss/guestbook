name: SEO Weekly Monitor

on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch:

concurrency:
  group: seo-weekly-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SEO_BASE_URL: ${{ vars.SEO_BASE_URL }}
      GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
      GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
      SEO_BRAND_TERMS: ${{ vars.SEO_BRAND_TERMS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate required secrets
        run: |
          test -n "$GSC_SITE_URL" || (echo "Missing secret: GSC_SITE_URL" && exit 1)
          test -n "$GSC_SERVICE_ACCOUNT_JSON" || (echo "Missing secret: GSC_SERVICE_ACCOUNT_JSON" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Run SEO weekly monitor
        run: npm run seo:weekly-monitor

      - name: Commit tracker update
        run: |
          if git diff --quiet -- ops/seo/seo-weekly-tracker.csv; then
            echo "No tracker changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/seo/seo-weekly-tracker.csv
          git commit -m "chore(seo): update weekly tracker"
          git push
